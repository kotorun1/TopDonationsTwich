  /* darken + tint the photographed CRT background so green text pops */
  .screen::before{
    content:"";
    position:absolute; inset:0;
    background:rgba(3,10,4,.72);
    mix-blend-mode:multiply;
    z-index:1;
  }

  /* subtle scanline shimmer overlay, on top of everything */
  .screen::after{
    content:"";
    position:absolute; inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(
      0deg,
      rgba(0,0,0,.18) 0px,
      rgba(0,0,0,.18) 1px,
      transparent 2px,
      transparent 3px
    );
    z-index:5;
    animation: flicker 5.5s infinite;
  }

  .crt-curve{
    position:absolute; inset:0;
    z-index:6;
    pointer-events:none;
    box-shadow:
      inset 0 0 90px 20px rgba(0,0,0,.55),
      inset 0 0 4px 2px rgba(92,255,122,.15);
    border-radius:8px;
  }

  @keyframes flicker{
    0%,100%{ opacity:1; }
    92%{ opacity:1; }
    93%{ opacity:.85; }
    94%{ opacity:1; }
    96%{ opacity:.9; }
    97%{ opacity:1; }
  }

  .content{
    position:relative;
    z-index:3;
    color:var(--phosphor);
    padding:26px 30px 22px;
    text-shadow:
      0 0 2px var(--phosphor),
      0 0 8px rgba(92,255,122,.6),
      0 0 16px rgba(92,255,122,.25);
    letter-spacing:.5px;
  }

  .boot-line{
    font-size:13px;
    color:var(--phosphor-dim);
    opacity:.85;
    margin:0 0 4px;
  }

  .divider{
    border:none;
    border-top:1px dashed var(--phosphor-dim);
    opacity:.6;
    margin:10px 0 14px;
  }

  .title-row{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:2px;
  }

  h1{
    font-family:'VT323',monospace;
    font-size:38px;
    margin:0;
    letter-spacing:2px;
    text-transform:uppercase;
  }

  .sys-clock{
    font-size:14px;
    color:var(--amber-warn);
    text-shadow:0 0 6px rgba(255,176,0,.6);
  }

  table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    font-size:19px;
  }

  thead th{
    text-align:left;
    font-weight:normal;
    color:var(--phosphor-dim);
    border-bottom:1px solid var(--phosphor-dim);
    padding:4px 6px 8px;
    text-transform:uppercase;
    font-size:14px;
    letter-spacing:1px;
  }

  tbody td{
    padding:5px 6px;
    white-space:nowrap;
  }

  tbody tr td:first-child{
    width:44px;
    color:var(--amber-warn);
  }

  tbody tr td:nth-child(2){
    width:auto;
  }

  tbody tr td:last-child{
    text-align:right;
    font-weight:bold;
  }

  tbody tr:nth-child(1){ font-size:22px; }
  tbody tr:nth-child(1) td:last-child{ color:var(--amber-warn); }

  .footer-line{
    margin-top:16px;
    font-size:14px;
    color:var(--phosphor-dim);
    display:flex;
    justify-content:space-between;
  }

  .cursor{
    display:inline-block;
    width:9px; height:16px;
    background:var(--phosphor);
    margin-left:4px;
    vertical-align:-3px;
    animation:blink 1s steps(1) infinite;
    box-shadow:0 0 6px rgba(92,255,122,.8);
  }

  @keyframes blink{
    0%,49%{ opacity:1; }
    50%,100%{ opacity:0; }
  }

  @media (max-width:520px){
    h1{ font-size:28px; }
    table{ font-size:15px; }
    .content{ padding:18px 16px; }
  }

  .empty-state{
    text-align:center;
    padding:30px 10px;
    color:var(--phosphor-dim);
    font-size:16px;
  }
  html, body{ background:transparent; }

</style>
</head>
<body>

  <div class="crt-frame">
    <div class="screen">
      <div class="crt-curve"></div>
      <div class="content" id="content">
        <div class="boot-line" id="bootLine">&gt; INIT D4CH_TERMINAL.EXE ...OK</div>
        <div class="title-row">
          <h1>TOP DONATORS</h1>
          <div class="sys-clock" id="clock">--:--:--</div>
        </div>
        <hr class="divider">
        <table>
          <thead>
            <tr><th>#</th><th>USER</th><th>AMOUNT</th></tr>
          </thead>
          <tbody id="tbody"><!-- filled by JS --></tbody>
        </table>
        <div class="footer-line">
          <span>SYSTEM: DOOMER4CHAN</span>
          <span>UPDATED <span id="updDate"></span><span class="cursor"></span></span>
        </div>
      </div>
    </div>
  </div>


<script src="panel.js"></script>


</body>
</html>
